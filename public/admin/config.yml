backend:
  name: github
  repo: shahzadishq/plaster
  branch: main
  # Password-login worker that releases the GitHub token after a correct password.
  # Deploy cms-auth-worker/ and paste its URL here (see cms-auth-worker/README.md).
  base_url: https://plaster-cms-auth.shahzadishaq.workers.dev

# Pläster logo on the login screen + sidebar (instead of the Decap logo).
logo_url: /assets/Plaster-logo.webp

# Uploaded images are committed here and referenced as assets/<file> in content.
media_folder: "public/assets"
public_folder: "assets"

site_url: https://plaster.shahzadishaq.workers.dev/
display_url: https://plaster.shahzadishaq.workers.dev/
locale: "de"

collections:
  - name: settings
    label: "Einstellungen"
    label_singular: "Einstellung"
    description: "Farben, Kontaktdaten und die wichtigsten Texte der Website."
    editor:
      preview: false
    files:
      - name: site
        label: "Farben, Kontakt & Texte"
        file: "src/content/settings.json"
        fields:
          - label: "Farben"
            name: colors
            widget: object
            hint: "Markenfarben der Website. Tipp: nur ändern, wenn nötig."
            collapsed: true
            fields:
              - { label: "Primär (Hellblau)", name: brand, widget: color }
              - { label: "Sekundär (Navy)", name: navy, widget: color }
              - { label: "Akzent (Gold)", name: amber, widget: color }
          - label: "Kontaktdaten"
            name: contact
            widget: object
            hint: "Wird im Kontaktbereich und im Footer angezeigt."
            fields:
              - { label: "Firma", name: company, widget: string }
              - { label: "Straße & Hausnummer", name: street, widget: string }
              - { label: "PLZ", name: postal, widget: string }
              - { label: "Ort", name: city, widget: string }
              - { label: "Land", name: country, widget: string, required: false }
              - { label: "Telefon (Anzeige)", name: phone, widget: string, hint: "So wird die Nummer angezeigt, z. B. +49 (0) 7641 95257" }
              - { label: "Telefon (für den Anruf-Link)", name: phoneHref, widget: string, hint: "Nur Ziffern und +, z. B. +49764195257" }
              - { label: "E-Mail", name: email, widget: string }
              - { label: "Webseite", name: web, widget: string }
              - { label: "Öffnungszeiten", name: hours, widget: string }
          - label: "Hero (oberster Bereich)"
            name: hero
            widget: object
            fields:
              - { label: "Einleitungstext", name: lead, widget: text, hint: "Der kurze Text unter der großen Überschrift." }
          - label: "Über uns"
            name: about
            widget: object
            fields:
              - { label: "Text", name: text, widget: text, hint: "Beschreibungstext im Bereich „Über uns“." }

  - name: faq
    label: "FAQ (Häufige Fragen)"
    label_singular: "Frage"
    description: "Fragen und Antworten im FAQ-Bereich. Reihenfolge per Drag & Drop."
    editor:
      preview: false
    files:
      - name: list
        label: "Häufige Fragen"
        file: "src/content/faq.json"
        fields:
          - label: "Fragen"
            name: items
            widget: list
            label_singular: "Frage"
            summary: "{{fields.q}}"
            hint: "Klicken Sie auf eine Frage zum Bearbeiten. Mit dem Griff links umsortieren."
            fields:
              - { label: "Frage", name: q, widget: string }
              - { label: "Antwort", name: a, widget: text }

  - name: services
    label: "Leistungen"
    label_singular: "Leistung"
    description: "Die Reinigungs-Leistungen mit Bild und Symbol."
    editor:
      preview: false
    files:
      - name: list
        label: "Leistungen"
        file: "src/content/services.json"
        fields:
          - label: "Leistungen"
            name: items
            widget: list
            label_singular: "Leistung"
            summary: "{{fields.title}}"
            hint: "Klicken Sie auf eine Leistung zum Bearbeiten. Mit dem Griff links umsortieren."
            fields:
              - { label: "Titel", name: title, widget: string }
              - { label: "Beschreibung", name: desc, widget: text }
              - { label: "Bild", name: image, widget: image, hint: "Bild hochladen oder aus der Mediathek wählen." }
              - { label: "Bild-Alt-Text", name: alt, widget: string, required: false, hint: "Kurze Bildbeschreibung (für Suchmaschinen & Barrierefreiheit)." }
              - label: "Symbol"
                name: icon
                widget: select
                default: building
                hint: "Symbol, das neben der Leistung angezeigt wird."
                options:
                  - { label: "Gebäude", value: building }
                  - { label: "Fenster", value: window }
                  - { label: "Bauhelm", value: hardhat }
                  - { label: "Sonne / Photovoltaik", value: sun }
                  - { label: "Schild / Hygiene", value: shield }
                  - { label: "Warnung", value: alert }
                  - { label: "Werkzeug", value: wrench }

  - name: sections
    label: "Bereiche (ein-/ausblenden)"
    label_singular: "Bereich"
    description: "Steuern, welche Bereiche der Website sichtbar sind und in welcher Reihenfolge."
    editor:
      preview: false
    files:
      - name: order
        label: "Bereiche"
        file: "src/content/sections.json"
        fields:
          - label: "Bereiche"
            name: items
            widget: list
            label_singular: "Bereich"
            summary: "{{fields.label}} — {{fields.visible | ternary('sichtbar','ausgeblendet')}}"
            hint: "Schalter „Sichtbar“ aus = Bereich verschwindet. Mit dem Griff links umsortieren."
            fields:
              - { label: "Name", name: label, widget: string }
              - { label: "ID (bitte nicht ändern)", name: id, widget: string }
              - { label: "Sichtbar", name: visible, widget: boolean, default: true }
